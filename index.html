<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixcelGold</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>PixcelGold</h1>

    <div class="pg-title">
        <span id="pgBalance">PG 39</span>
    </div>

    <div class="gold-circle"></div>

    <div class="card">

        <p class="green">
            معدل التعدين:
            <span id="rate">1.4722</span>
            PG / 100 ساعة
        </p>

        <button id="claimBtn" disabled>
            استلام PG
        </button>

        <p class="note">
            يجب أن يصل رصيد التعدين إلى 10 PG لتتمكن من الاستلام.
        </p>

    </div>

</div>

<script src="script.js"></script>
<script src="effects.js"></script>

</body>
</html>
