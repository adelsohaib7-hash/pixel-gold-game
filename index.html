<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PixelGold - Stable</title>
    <style>
        body { margin: 0; background: #121212; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; background: #1e1e1e; padding: 10px; text-align: center; border-bottom: 2px solid #333; font-size: 14px; color: #888; }
        #balance { font-size: 40px; font-weight: bold; color: #ffd700; margin: 20px 0; }
        .coin { width: 180px; height: 180px; background: #ffd700; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .coin:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header" id="user-tag">ID: جاري التحميل...</div>
    <div id="balance">PG 0</div>
    <div class="coin" onclick="handleTap()">اضغط</div>

    <script>
        // 1. نظام التعريف (ID)
        let userId = localStorage.getItem('pid') || 'PG-' + Date.now();
        localStorage.setItem('pid', userId);
        document.getElementById('user-tag').innerText = "ID: " + userId;

        // 2. نظام الرصيد
        let gold = parseInt(localStorage.getItem('gold') || 0);
        function updateDisplay() {
            document.getElementById('balance').innerText = "PG " + gold;
        }

        function handleTap() {
            gold++;
            localStorage.setItem('gold', gold);
            updateDisplay();
        }

        updateDisplay();
    </script>
</body>
</html>
