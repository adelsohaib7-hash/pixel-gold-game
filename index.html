<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Gold</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background-color: #0a0a0f; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .screen { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* تصميم الشاشة الرئيسية */
        .balance { font-size: 36px; font-weight: bold; color: #ffd700; margin-bottom: 20px; }
        .circle { width: 200px; height: 200px; border-radius: 50%; background: #1a1a2e; border: 4px solid #ffd700; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; margin-bottom: 20px; }
        .stats-container { display: flex; justify-content: space-around; width: 100%; margin-bottom: 20px; }
        .stat-box { text-align: center; background: #1a1a2e; padding: 10px; border-radius: 10px; width: 45%; }
        .btn-claim { background: #00e676; color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        /* تصميم الإحالات */
        .referral-card { background: #1a1a2e; padding: 20px; border-radius: 15px; border: 1px solid #333; width: 100%; margin-bottom: 20px; }
        .link-container { display: flex; background: #0a0a0f; padding: 10px; border-radius: 8px; margin-top: 10px; justify-content: space-between; border: 1px solid #444; }
        .copy-btn { background: #ffd700; color: #000; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .empty-state { text-align: center; color: #666; margin-top: 30px; }
        
        /* القائمة السفلية */
        .nav { height: 70px; background: #0f0f1a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; position: sticky; bottom: 0; }
        .nav-item { cursor: pointer; text-align: center; color: #aaa; font-size: 12px; }
        .nav-item.active { color: #ffd700; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="balance" id="total">0.00</div>
        <div class="circle" id="clicker">P</div>
        <div class="stats-container">
            <div class="stat-box">التعدين<br><span id="mining-pool">0.00</span></div>
            <div class="stat-box">النقرات<br><span id="click-pool">0.00</span></div>
        </div>
        <button class="btn-claim" id="btn-claim">استلام الأرباح</button>
    </div>

    <div id="screen-tasks" class="screen"><h2>قائمة المهام</h2></div>

    <div id="screen-friends" class="screen">
        <h2>برنامج الإحالة</h2>
        <div class="referral-card">
            <button class="btn-claim" style="background:#007bff; color:white;">مشاركة الرابط</button>
            <div class="link-container">
                <span id="ref-link">t.me/bot?start=12345</span>
                <button class="copy-btn" onclick="copyLink()">نسخ</button>
            </div>
        </div>
        <h3>الأصدقاء:</h3>
        <div id="friend-list-container" class="friend-list" style="width:100%;">
            <div class="empty-state">لم ينضم أي صديق بعد. ابدأ بمشاركة رابطك!</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="nav-home" onclick="showScreen('home')">🏠<br>الرئيسية</div>
        <div class="nav-item" id="nav-tasks" onclick="showScreen('tasks')">📋<br>المهام</div>
        <div class="nav-item" id="nav-friends" onclick="showScreen('friends')">👥<br>دعوة</div>
    </div>

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('ref-link').innerText);
            alert("تم نسخ الرابط!");
        }

        let total = parseFloat(localStorage.getItem('total')) || 0;
        let miningPool = parseFloat(localStorage.getItem('miningPool')) || 0;
        let clickPool = parseFloat(localStorage.getItem('clickPool')) || 0;

        function updateUI() {
            document.getElementById('total').innerText = total.toFixed(2);
            document.getElementById('mining-pool').innerText = miningPool.toFixed(2);
            document.getElementById('click-pool').innerText = clickPool.toFixed(2);
        }

        setInterval(() => { miningPool += 0.01; updateUI(); localStorage.setItem('miningPool', miningPool); }, 1000);
        document.getElementById('clicker').onclick = () => { clickPool += 0.05; updateUI(); localStorage.setItem('clickPool', clickPool); };
        document.getElementById('btn-claim').onclick = () => { total += (miningPool + clickPool); miningPool = 0; clickPool = 0; updateUI(); localStorage.setItem('total', total); };
        
        updateUI();
    </script>
</body>
</html>
