<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelGold</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .screen { display: none; flex: 1; padding: 20px; align-items: center; justify-content: center; flex-direction: column; overflow-y: auto; }
        .screen.active { display: flex; }
        
        #main-balance { font-size: 32px; font-weight: bold; color: #ffd700; margin-bottom: 20px; }
        
        .coin-button { width: 180px; height: 180px; background: radial-gradient(circle, #ffd700, #b8860b); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; cursor: pointer; text-align: center; padding: 10px; transition: transform 0.1s; }
        .coin-button:active { transform: scale(0.95); }

        .mining-area { background: #252525; padding: 20px; border-radius: 15px; width: 90%; margin-top: 20px; text-align: center; border: 1px solid #444; }
        .claim-btn { width: 100%; padding: 12px; background: #007bff; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .claim-btn:disabled { background: #555; cursor: not-allowed; }
        
        .nav { height: 60px; background: #0f0f1a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { cursor: pointer; text-align: center; font-size: 12px; color: #aaa; }
    </style>
</head>
