<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelGold</title>
    <style>
        body { 
            margin: 0; 
            background-color: #1a1a1a; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            padding-top: 20px; 
        }
        
        .header-balance { font-size: 28px; font-weight: bold; color: #ffd700; margin-bottom: 20px; }
        
        .coin { 
            width: 160px; 
            height: 160px; 
            background: radial-gradient(circle, #ffd700, #b8860b); 
            border-radius: 50%; 
            cursor: pointer; 
            margin-bottom: 30px; 
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); 
        }

        .mining-area { 
            background: #252525; 
            padding: 20px; 
            border-radius: 15px; 
            width: 85%; 
            border: 1px solid #444; 
            text-align: center; 
        }
        
        .mining-rate { color: #00ff00; font-size: 14px; margin-bottom: 5px; }
        
        .claim-btn { 
            width: 100%; 
            padding: 15px; 
            background: #007bff; 
            border: none; 
            border-radius: 10px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
        }
        
        .claim-btn:disabled { background: #555; cursor: not-allowed; }
        
        .note { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header-balance" id="balance">0 PG</div>

    <div class="coin" onclick="addGold()"></div>

    <div class="mining-area">
        <div class="mining-rate">معدل التعدين: 100 PG / ساعة</div>
        <div id="pending-balance" style="font-size: 24px;">0.0000</div>
        <button id="claim-btn" class="claim-btn" onclick="claimMining()" disabled>استلام PG ⬇</button>
        <p class="note">* يجب أن يصل رصيد التعدين إلى 10 PG لتتمكن من الاستلام.</p>
    </div>

    <script>
        let gold = 0;
        let pending = 0;
        
        setInterval(() => {
            pending += (100 / 3600); 
            document.getElementById('pending-balance').innerText = pending.toFixed(4);
            document.getElementById('claim-btn').disabled = (pending < 10);
        }, 1000);

        function addGold() {
            gold++;
            document.getElementById('balance').innerText = gold + " PG";
        }

        function claimMining() {
            if (pending >= 10) {
                gold += Math.floor(pending);
                pending = 0;
                document.getElementById('balance').innerText = gold + " PG";
                document.getElementById('pending-balance').innerText = "0.0000";
            }
        }
    </script>
</body>
</html>
