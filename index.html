<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelGold</title>
    <style>
        body { 
            margin: 0; 
            background-color: #1a1a1a; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        #balance { font-size: 60px; font-weight: bold; color: #ffd700; margin: 20px 0; }
        .coin { 
            width: 200px; 
            height: 200px; 
            background: radial-gradient(circle, #ffd700, #b8860b); 
            border-radius: 50%; 
            cursor: pointer; 
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transition: transform 0.1s;
        }
        .coin:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <p>اضغط على العملة لتجميع الذهب!</p>
    <div id="balance">0</div>
    <div class="coin" onclick="addGold()"></div>

    <script>
        let gold = 0;
        function addGold() {
            gold++;
            document.getElementById('balance').innerText = gold;
        }
    </script>
</body>
</html>
