<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelGold</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .screen { display: none; flex: 1; padding: 20px; align-items: center; justify-content: center; flex-direction: column; overflow-y: auto; }
        .screen.active { display: flex; }
        
        .header-balance { font-size: 28px; font-weight: bold; color: #ffd700; margin-bottom: 10px; }
        
        .coin { width: 160px; height: 160px; background: radial-gradient(circle, #ffd700, #b8860b); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; color: #000; padding: 10px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .click-note { color: #888; font-size: 14px; margin-bottom: 20px; }

        .mining-area { background: #252525; padding: 20px; border-radius: 15px; width: 85%; border: 1px solid #444; text-align: center; }
        .mining-rate { color: #00ff00; font-size: 14px; margin-bottom: 5px; }
        .claim-btn { width: 100%; padding: 15px; background: #007bff; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .claim-btn:disabled { background: #555; cursor: not-allowed; }
        .note { font-size: 12px; color: #888; margin-top: 10px; }

        .nav { height: 70px; background: #0f0f1a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { cursor: pointer; text-align: center; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="header-balance" id="balance">0 PG</div>
        <div class="coin" onclick="addGold()">اضغط لربح PG</div>
        <div class="click-note">1 PG لكل ضغطة</div>
        <div class="mining-area">
            <div class="mining-rate">معدل التعدين: 100 PG / ساعة</div>
            <div id="pending-balance" style="font-size: 24px;">0.0000</div>
            <button id="claim-btn" class="claim-btn" onclick="claimMining()" disabled>استلام PG ⬇</button>
            <p class="note">* يجب أن يصل رصيد التعدين إلى 10 PG لتتمكن من الاستلام.</p>
        </div>
    </div>

    <div id="screen-tasks" class="screen"><h2>📋 المهام</h2></div>
    <div id="screen-friends" class="screen"><h2>👥 الأصدقاء</h2></div>
    <div id="screen-wallet" class="screen"><h2>💰 المحفظة</h2></div>

    <div class="nav">
        <div class="nav-item" onclick="showScreen('wallet')">💰<br>المحفظة</div>
