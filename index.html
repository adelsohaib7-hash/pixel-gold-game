<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Gold Mining</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background-color: #0a0a0f; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .screen { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .screen.active { display: block; }
        
        .referral-card { background: #1a1a2e; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .btn-action { background: #007bff; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .link-container { display: flex; background: #0a0a0f; padding: 10px; border-radius: 8px; margin-top: 10px; justify-content: space-between; border: 1px solid #444; }
        .copy-btn { background: #ffd700; color: #000; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .empty-state { text-align: center; color: #666; margin-top: 30px; }
        .friend-list { margin-top: 20px; }
        
        .nav { height: 70px; background: #0f0f1a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { cursor: pointer; text-align: center; color: #aaa; }
        .nav-item.active { color: #ffd700; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div style="text-align:center; margin-top:50px;">
            <h1 id="total">0.00</h1>
            <p>الرصيد الإجمالي</p>
        </div>
    </div>
    <div id="screen-tasks" class="screen"><h2>قائمة المهام</h2></div>

    <div id="screen-friends" class="screen">
        <h2>برنامج الإحالة</h2>
        <div class="referral-card">
            <button class="btn-action">مشاركة الرابط</button>
            <div class="link-container">
                <span id="ref-link">t.me/bot?start=12345</span>
                <button class="copy-btn" onclick="copyLink()">نسخ</button>
            </div>
        </div>
        
        <h3>قائمة الأصدقاء:</h3>
        <div id="friend-list-container" class="friend-list">
            <div class="empty-state" id="empty-msg">
                لم ينضم أي صديق بعد. <br> ابدأ بمشاركة رابطك الآن!
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="nav-home" onclick="showScreen('home')">🏠<br>الرئيسية</div>
        <div class="nav-item" id="nav-tasks" onclick="showScreen('tasks')">📋<br>المهام</div>
        <div class="nav-item" id="nav-friends" onclick="showScreen('friends')">👥<br>دعوة</div>
    </div>

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('ref-link').innerText);
            alert("تم النسخ!");
        }

        // محاكاة بيانات الأصدقاء (حالياً مصفوفة فارغة)
        const friends = []; 

        function renderFriends() {
            const container = document.getElementById('friend-list-container');
            const emptyMsg = document.getElementById('empty-msg');
            
            if (friends.length === 0) {
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
                // هنا نضيف كود عرض الأصدقاء إذا وجدوا
            }
        }

        renderFriends();
    </script>
</body>
</html>
