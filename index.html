<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixcelGold</title>
    <style>
        body { margin: 0; background-color: #0a0a0f; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .screen { display: none; flex: 1; padding: 20px; align-items: center; justify-content: center; flex-direction: column; }
        .screen.active { display: flex; }
        
        /* تصميم دائرة التعدين */
        .circle { width: 200px; height: 200px; border-radius: 50%; border: 4px solid #ffd700; display: flex; align-items: center; justify-content: center; font-size: 50px; margin: 20px 0; cursor: pointer; background: #1a1a2e; }
        
        /* القائمة السفلية */
        .nav { height: 60px; background: #1a1a2e; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { cursor: pointer; text-align: center; font-size: 14px; }
        
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #ffd700; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- الرئيسية (التعدين) -->
    <div id="screen-home" class="screen active">
        <p>رصيدك الحالي</p>
        <h1 id="balance">1.40</h1>
        <div class="circle" onclick="mine()">P</div>
        <button onclick="invite()">دعوة صديق</button>
    </div>

    <!-- المهام -->
    <div id="screen-tasks" class="screen">
        <h2>قائمة المهام</h2>
        <p>اشترك في القناة واحصل على 50 Pixcel</p>
    </div>

    <!-- المحفظة -->
    <div id="screen-wallet" class="screen">
        <h2>المحفظة</h2>
        <input type="text" id="wallet" placeholder="عنوان المحفظة...">
        <button onclick="alert('تم حفظ العنوان')">حفظ المحفظة</button>
    </div>

    <!-- القائمة السفلية -->
    <div class="nav">
        <div class="nav-item" onclick="showScreen('wallet')">💰 المحفظة</div>
        <div class="nav-item" onclick="showScreen('tasks')">📋 المهام</div>
        <div class="nav-item" onclick="showScreen('home')">🏠 الرئيسية</div>
    </div>

    <script>
        let b = 1.40;
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }
        function mine() {
            b += 0.1;
            document.getElementById('balance').innerText = b.toFixed(2);
        }
        function invite() {
            alert("رابط الدعوة الخاص بك: t.me/PixcelGold_bot?start=ref123");
        }
    </script>
</body>
</html>
