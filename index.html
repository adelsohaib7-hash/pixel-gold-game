<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PixelGold</title>
    <style>
        body { margin: 0; background: #121212; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #user-id { color: #888; font-size: 14px; margin-bottom: 20px; }
        #balance { font-size: 40px; font-weight: bold; color: #ffd700; margin-bottom: 30px; }
        .coin { width: 180px; height: 180px; background: #ffd700; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .coin:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="user-id">جاري التحميل...</div>
    <div id="balance">PG 0</div>
    <div class="coin" onclick="addGold()">اضغط</div>

    <script>
        // 1. التعامل مع الـ ID
        let userId = localStorage.getItem('pid') || 'PG-' + Date.now();
        localStorage.setItem('pid', userId);
        document.getElementById('user-id').innerText = "ID: " + userId;

        // 2. التعامل مع الرصيد
        let gold = parseInt(localStorage.getItem('gold') || 0);
        document.getElementById('balance').innerText = "PG " + gold;

        function addGold() {
            gold++;
            localStorage.setItem('gold', gold);
            document.getElementById('balance').innerText = "PG " + gold;
        }
    </script>
</body>
</html>
