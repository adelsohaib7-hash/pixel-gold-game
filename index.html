<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PixcelGold</title>
    <style>
        body { margin: 0; background-color: #0a0a0f; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* الشاشات */
        .screen { display: none; flex: 1; padding: 20px; align-items: center; justify-content: center; flex-direction: column; }
        .screen.active { display: flex; }
        
        /* عناصر الواجهة */
        .balance-container { text-align: center; margin-bottom: 30px; }
        .balance-text { font-size: 18px; color: #aaa; }
        .balance-value { font-size: 32px; color: #ffd700; font-weight: bold; }
        
        .clicker-circle { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #1a1a2e, #0a0a0f); border: 4px solid #ffd700; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); transition: transform 0.1s; }
        .clicker-circle:active { transform: scale(0.95); }

        /* القائمة السفلية */
        .nav { height: 75px; background: #0f0f1a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { cursor: pointer; text-align: center; color: #aaa; font-size: 12px; }
        .nav-item.active { color: #ffd700; }

        /* المحفظة والمهام */
        input { width: 85%; padding: 15px; border-radius: 10px; border: none; background: #1a1a2e; color: white; margin-bottom: 15px; text-align: center; }
        button { padding: 12px 40px; background: #ffd700; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: #000; }
        .task-list { width: 100%; max-width: 300px; }
        .task-item { background: #1a1a2e; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <!-- الشاشة الرئيسية -->
    <div id="screen-home" class="screen active">
        <div class="balance-container">
            <div class="balance-text">رصيدك الحالي</div>
            <div class="balance-value" id="total-balance">0.00</div>
        </div>
        <div class="clicker-circle" id="clicker">P</div>
    </div>

    <!-- شاشة المهام -->
    <div id="screen-tasks" class="screen">
        <h2>قائمة المهام</h2>
        <div class="task-list">
            <div class="task-item">اشترك في القناة <span>+50</span></div>
            <div class="task-item">تابعنا على تويتر <span>+30</span></div>
        </div>
    </div>

    <!-- شاشة المحفظة -->
    <div id="screen-wallet" class="screen">
        <h2>محفظة PixcelGold</h2>
        <input type="text" id="wallet-address" placeholder="عنوان محفظة (USDT/TON)">
        <button onclick="withdraw()">طلب سحب الأرباح</button>
        <p id="status"></p>
    </div>

    <!-- القائمة السفلية -->
    <div class="nav">
        <div class="nav-item active" id="nav-home" onclick="showScreen('home')">🏠<br>الرئيسية</div>
        <div class="nav-item" id="nav-tasks" onclick="showScreen('tasks')">📋<br>المهام</div>
        <div class="nav-item" id="nav-wallet" onclick="showScreen('wallet')">💰<br>المحفظة</div>
    </div>

    <script>
        let balance = 0.00;
        
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
        }

        document.getElementById('clicker').onclick = () => {
            balance += 0.1;
            document.getElementById('total-balance').innerText = balance.toFixed(2);
        };

        function withdraw() {
            const addr = document.getElementById('wallet-address').value;
            if(addr.length > 10) {
                document.getElementById('status').innerText = "✅ تم تقديم طلب السحب بنجاح";
            } else {
                document.getElementById('status').innerText = "⚠️ يرجى إدخال عنوان محفظة صحيح";
            }
        }
    </script>
</body>
</html>
